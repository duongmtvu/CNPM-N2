<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./css/bootstrap.min.css" rel="stylesheet">
  <title>Mẫu Đăng Ký</title>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .form-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      margin-top: 50px;
      margin-bottom: 50px;
    }
    
    .form-title {
      color: #333;
      font-weight: 700;
      font-size: 28px;
      margin-bottom: 30px;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .form-label {
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .form-control {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 15px;
      transition: all 0.3s ease;
      background-color: #f9f9f9;
    }
    
    .form-control:focus {
      border-color: #667eea;
      background-color: white;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      padding: 12px 40px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .info-text {
      color: #666;
      font-size: 14px;
      margin-top: 25px;
      padding: 15px;
      background-color: #f0f0f0;
      border-left: 4px solid #667eea;
      border-radius: 4px;
      font-style: italic;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="container form-container">
  <h2 class="form-title">📋 Mẫu Đăng Ký Thông Tin</h2>

  <form action="/action_page.php" class="needs-validation" novalidate>
    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <label for="fname" class="form-label">👤 First name</label>
          <input type="text" class="form-control" id="fname" name="fname" value="Hồng Phương" required>
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-group">
          <label for="lname" class="form-label">👤 Last name</label>
          <input type="text" class="form-control" id="lname" name="lname" value="Phạm Thị" required>
        </div>
      </div>
    </div>
    
    <div class="row">
      <div class="col-12">
        <button type="submit" class="btn btn-primary w-100">✓ Submit</button>
      </div>
    </div>
  </form>
  
  <p class="info-text">ℹ️ Khi bạn nhấn nút "Submit", dữ liệu biểu mẫu sẽ được gửi đến trang "/action_page.php".</p>
</div>

<script src="./js/bootstrap.bundle.min.js"></script>
</body>
</html>
