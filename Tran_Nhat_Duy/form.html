<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HTML Forms với Bootstrap</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    
    <style>
        /* Thêm một chút CSS để form nằm giữa màn hình cho dễ nhìn */
        body { 
            padding-top: 50px; 
            background-color: #f4f7f6; 
        }
        .container { 
            max-width: 500px; 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-primary mb-4">HTML Forms</h2>

    <form action="/action_page.php">
        <div class="mb-3">
            <label for="fname" class="form-label">First name:</label>
            <input type="text" class="form-control" id="fname" name="fname" value="John">
        </div>

        <div class="mb-3">
            <label for="lname" class="form-label">Last name:</label>
            <input type="text" class="form-control" id="lname" name="lname" value="Doe">
        </div>

        <input type="submit" class="btn btn-primary w-100" value="Submit">
    </form>

    <p class="mt-4 text-secondary" style="font-size: 0.9rem;">
        If you click the "Submit" button, the form-data will be sent to a page called "/action_page.php".
    </p>
</div>

</body>
</html>
