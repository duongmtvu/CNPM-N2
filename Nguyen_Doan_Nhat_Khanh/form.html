<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms with Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 card shadow p-4">
                
                <h2 class="text-center text-primary mb-4">HTML Forms</h2>

                <form action="/action_page.php">
                    <div class="mb-3">
                        <label for="fname" class="form-label">First name:</label>
                        <input type="text" class="form-control" id="fname" name="fname" value="John">
                    </div>

                    <div class="mb-3">
                        <label for="lname" class="form-label">Last name:</label>
                        <input type="text" class="form-control" id="lname" name="lname" value="Doe">
                    </div>

                    <div class="d-grid">
                        <input type="submit" class="btn btn-primary" value="Submit">
                    </div>
                </form>

                <p class="mt-4 text-muted small text-center">
                    If you click the "Submit" button, the form-data will be sent to a page called "/action_page.php".
                </p>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
