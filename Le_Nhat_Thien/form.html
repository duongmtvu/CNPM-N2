<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Forms</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    </head>
<body>

    <div class="container mt-5">
        </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</head>
<body>

    <h2>HTML Forms</h2>

    <form action="/action_page.php">
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="John"><br><br>

        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" value="Doe"><br><br>

        <input type="submit" value="Submit">
    </form>
    <p>If you click the "Submit" button, the form-data will be sent to a page called "/action_page.php".</p>
<form>
    <div class="mb-3">
        <label for="fullName" class="form-label">Họ và Tên</label>
        <input type="text" class="form-control" id="fullName" placeholder="Nhập họ tên của bạn">
    </div>

    <div class="mb-3">
        <label for="exampleEmail" class="form-label">Địa chỉ Email</label>
        <input type="email" class="form-control" id="exampleEmail" placeholder="name@example.com">
    </div>

    <div class="d-grid gap-2 d-md-block">
        <button type="submit" class="btn btn-primary">Gửi thông tin</button>
        <button type="reset" class="btn btn-outline-secondary">Hủy bỏ</button>
    </div>
</form>
</body>
</html>
